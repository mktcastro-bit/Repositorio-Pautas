          <span class="badge badge-pilar">${params.pilar}</span>
          <span class="badge badge-formato">${params.formato}</span>
          <span class="badge ${varianteBadgeClass(params.variante)}">${params.variante}</span>
          <span class="badge ${redeBadgeClass(params.rede_social)}">${params.rede_social}</span>
          ${picahBadges}
        </div>
        ${result.angulo_nexum?`<div class="wf-result-section"><div class="wf-result-label">Ângulo Nexum360</div><div class="wf-result-text">${escHtml(result.angulo_nexum)}</div></div>`:''}
        ${slidesHtml?`<div class="wf-result-section"><div class="wf-result-label">${isCarousel?'Slides':'Conteúdo'}</div><div style="display:flex;flex-direction:column;gap:8px">${slidesHtml}</div></div>`:''}
        ${result.legenda_ig?`<div class="wf-result-section"><div class="wf-result-label">Legenda Instagram</div><div class="wf-result-text">${escHtml(result.legenda_ig)}</div></div>`:''}
        ${result.legenda_li?`<div class="wf-result-section"><div class="wf-result-label">Legenda LinkedIn</div><div class="wf-result-text">${escHtml(result.legenda_li)}</div></div>`:''}`;
    }

    function wfRenderStep2() {
      if (!wfGenResult || !wfGenParams) return;
      wfSetStep(2);
      const result = wfGenResult;
      const params = wfGenParams;
      const isCarousel = params.formato === 'Carrossel';
      const slides = result.slides || [];

      const slideSelector = isCarousel && slides.length ? `
        <div class="wf-art-slide-select">
          <label class="wf-result-label" style="white-space:nowrap;align-self:center">Slide:</label>
          <select class="wf-select" id="wf-art-slide" style="width:auto">
            ${slides.map((s,i)=>`<option value="${i}">Slide ${i+1} — ${(s.titulo||'').substring(0,30)}${(s.titulo||'').length>30?'…':''}</option>`).join('')}
          </select>
        </div>` : '';

      const picahBadges = (result.picah||[]).map(x=>`<span class="badge badge-picah">${x}</span>`).join('');

      document.getElementById('workflowBody').innerHTML = `
        <div class="wf-two-col">
          <div class="wf-left">
            <div style="font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:700">Conteúdo Aprovado</div>
            <div class="wf-result-tema">${escHtml(result.tema||'')}</div>
            ${result.gancho?`<div class="wf-result-gancho">${escHtml(result.gancho)}</div>`:''}
            <div class="wf-info-row">
              <span class="badge badge-pilar">${params.pilar}</span>
              <span class="badge badge-formato">${params.formato}</span>
              <span class="badge ${varianteBadgeClass(params.variante)}">${params.variante}</span>
              <span class="badge ${redeBadgeClass(params.rede_social)}">${params.rede_social}</span>
              ${picahBadges}
            </div>
            ${result.angulo_nexum?`<div class="wf-result-section"><div class="wf-result-label">Ângulo Nexum360</div><div class="wf-result-text">${escHtml(result.angulo_nexum)}</div></div>`:''}
            ${result.legenda_ig?`<div class="wf-result-section"><div class="wf-result-label">Legenda Instagram</div><div class="wf-result-text">${escHtml(result.legenda_ig)}</div></div>`:''}
            ${result.legenda_li?`<div class="wf-result-section"><div class="wf-result-label">Legenda LinkedIn</div><div class="wf-result-text">${escHtml(result.legenda_li)}</div></div>`:''}
          </div>
          <div class="wf-right">
            <div style="font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);font-weight:700">Gerar Arte Visual</div>
            ${slideSelector}
            <div class="wf-art-actions">
              <button class="wf-primary" id="wf-gen-art-btn" onclick="doWfGenArt()">✦ Gerar Arte</button>
            </div>
            <div id="wf-art-preview" style="display:none;flex-direction:column;gap:10px">
              <div class="wf-art-iframe-wrap" id="wf-art-wrap"></div>
              <div class="wf-art-actions" id="wf-art-dl-row"></div>
            </div>
          </div>
        </div>`;

      document.getElementById('workflowFooter').innerHTML = `
        <button class="wf-secondary" onclick="wfRenderStep1()">← Editar Texto</button>
        <div style="display:flex;gap:8px">
          <button class="wf-secondary" onclick="wfSavePauta()">Salvar no Repositório</button>
          <button class="wf-primary" onclick="closeModal('workflowOverlay')">Concluir</button>
        </div>`;
    }

    async function doWfGenArt() {
      const url = getVercelUrl();
      if (!url) return showToast('Configure a URL do Vercel primeiro.', 'error');

      const slideSelect = document.getElementById('wf-art-slide');
      const slideIndex  = slideSelect ? parseInt(slideSelect.value) : 0;
      const btn         = document.getElementById('wf-gen-art-btn');
      const preview     = document.getElementById('wf-art-preview');
      const wrap        = document.getElementById('wf-art-wrap');
      const dlRow       = document.getElementById('wf-art-dl-row');

      btn.disabled = true; btn.textContent = '✦ Gerando…';
      preview.style.display = 'none';
      showProgress('loading');
      showToast('Gerando arte com IA... aguarde', 'loading', true);

      const pauta = {
        ...wfGenResult,
        pilar:       wfGenParams.pilar,
        variante:    wfGenParams.variante,
        formato:     wfGenParams.formato,
        rede_social: wfGenParams.rede_social,
      };

      try {
        const r = await fetch(`${url}/api/generate-art`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ pauta, slideIndex }),
        });
        const d = await r.json();
        if (!d.success) throw new Error(d.error);

        const blob    = new Blob([d.html], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);
        wrap.innerHTML = `<iframe src="${blobUrl}" id="wf-art-iframe"></iframe>`;
        const iframe = wrap.querySelector('iframe');
        iframe.onload = () => {
          const scale = wrap.clientWidth / 1080;
          iframe.style.transform = `scale(${scale})`;
          wrap.style.height = `${1350 * scale}px`;
        };

        const slideSuffix = wfGenParams.formato === 'Carrossel' ? `-slide-${slideIndex+1}` : '';
        dlRow.innerHTML = '';
        const dlBtn = document.createElement('a');
        dlBtn.className = 'wf-secondary'; dlBtn.style.textDecoration = 'none';
        dlBtn.textContent = '↓ Baixar HTML'; dlBtn.href = blobUrl;
        dlBtn.download = `post-gerado${slideSuffix}.html`;
        dlRow.appendChild(dlBtn);

        const regenBtn = document.createElement('button');
        regenBtn.className = 'wf-secondary'; regenBtn.textContent = '↺ Regerar';
        regenBtn.onclick = () => doWfGenArt();
        dlRow.appendChild(regenBtn);

        preview.style.display = 'flex';
        showProgress('success'); hideToast();
      } catch(e) {
        showProgress('error');
        showToast(`Erro: ${e.message}`, 'error');
      } finally {
        btn.disabled = false; btn.textContent = '✦ Gerar Arte';
      }
    }

    function wfSavePauta() {
      if (!wfGenResult || !wfGenParams) return;
      const result = wfGenResult;
      const params  = wfGenParams;
      const now     = new Date().toISOString().split('T')[0];
      const newId   = pautas.length ? Math.max(...pautas.map(p=>p.id))+1 : 1;
      pautas.unshift({
        id: newId, tema: result.tema || 'Conteúdo gerado por IA',
        pilar: params.pilar, rede_social: params.rede_social,
        formato: params.formato, variante: params.variante, status: 'Ideia',
        gancho: result.gancho||'', angulo_nexum: result.angulo_nexum||'',
        picah: result.picah||[], legenda_ig: result.legenda_ig||'',
        legenda_li: result.legenda_li||'', slides: result.slides||[],
        fonte: '', arquivo: '', slide_preview: '',
        data_criacao: now, data_planejada: null, data_publicacao: null,
        notas: `Gerado por IA em ${now}.`,
      });
      save(); renderCards(); scaleCardIframes();
      closeModal('workflowOverlay');
      showToast('Pauta adicionada ao repositório!', 'success');
    }

    // ── GERAÇÃO DE CONTEÚDO IA ────────────────────────────────

    function openGenerate() {
      document.getElementById('gen-result-area').style.display = 'none';
      document.getElementById('gen-result-area').innerHTML = '';
      // Reset formato publicação para Feed
      selectGenPubFormat(
        document.querySelector('#g-pub-format-selector [data-format="feed"]'), 'feed'
      );
      document.getElementById('generateOverlay').classList.add('open');
    }

    function selectGenPubFormat(btn, format) {
      document.querySelectorAll('#g-pub-format-selector button').forEach(b => {
        b.style.borderColor = 'var(--border)';
        b.style.background  = 'transparent';
        b.style.color       = 'var(--muted)';
      });
      btn.style.borderColor = 'var(--accent)';
      btn.style.background  = 'rgba(200,169,110,0.1)';
      btn.style.color       = 'var(--text)';
    }

    function getGenPubFormat() {
      const btns = document.querySelectorAll('#g-pub-format-selector button');
      for (const b of btns) {
        if (b.style.borderColor === 'var(--accent)' || b.style.background.includes('200')) {
          return b.dataset.format;
        }
      }
      return 'feed';
    }

    function getGenParams() {
      return {
        pilar:        document.getElementById('g-pilar').value,
        rede_social:  document.getElementById('g-rede').value,
        formato:      document.getElementById('g-formato').value,
        variante:     document.getElementById('g-variante').value,
        pub_formato:  getGenPubFormat(),
        tema:         document.getElementById('g-tema').value.trim(),
        gancho:       document.getElementById('g-gancho').value.trim(),
      };
    }

    async function doGenerateAI() {
      const url = getVercelUrl();
      if (!url) {
        showToast('Configure a URL do Vercel nas configurações (⚙ API) antes de usar a IA.', 'error');
        return;
      }

      const params = getGenParams();
      const area   = document.getElementById('gen-result-area');
      area.style.display = 'flex';
      area.style.flexDirection = 'column';
      area.style.alignItems = 'center';
      area.innerHTML = `<div class="gen-spinner"></div><div style="font-size:0.8rem;color:var(--muted);text-align:center">Gerando conteúdo com IA… pode levar alguns segundos</div>`;

      try {
        const r = await fetch(`${url}/api/generate`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(params),
        });
        const d = await r.json();

        if (!d.success) {
          area.innerHTML = `<div style="color:#e07070;font-size:0.82rem;padding:12px;background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:8px">
            ⚠ Erro: ${d.error || 'Falha ao gerar conteúdo.'}</div>`;
          return;
        }

        renderGenResult(d.result, params);

      } catch(e) {
        area.innerHTML = `<div style="color:#e07070;font-size:0.82rem;padding:12px;background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:8px">
          ⚠ Erro de conexão: ${e.message}</div>`;
      }
    }

    function renderGenResult(result, params) {
      const area   = document.getElementById('gen-result-area');
      const slides = (result.slides || []).map((s, i) => `
        <div class="gen-slide">
          <div class="gen-slide-num">Slide ${s.numero || i+1}</div>
          <div class="gen-slide-title">${escHtml(s.titulo || '')}</div>
          ${s.texto ? `<div class="gen-slide-text">${escHtml(s.texto)}</div>` : ''}
        </div>`).join('');

      const picahBadges = (result.picah || []).map(x =>
        `<span class="badge badge-picah">${x}</span>`).join('');

      area.style.alignItems = 'stretch';
      area.innerHTML = `
        <div class="gen-result">
          <div class="gen-result-tema">${escHtml(result.tema || '')}</div>
          ${result.gancho ? `<div class="gen-result-gancho">${escHtml(result.gancho)}</div>` : ''}

          <div class="card-meta" style="padding-top:0;border-top:none;gap:6px">
            <span class="badge badge-pilar">${params.pilar}</span>
            <span class="badge badge-formato">${params.formato}</span>
            <span class="badge ${varianteBadgeClass(params.variante)}">${params.variante}</span>
            <span class="badge ${redeBadgeClass(params.rede_social)}">${params.rede_social}</span>
            ${picahBadges}
          </div>

          ${result.angulo_nexum ? `
          <div class="gen-result-section">
            <div class="gen-result-label">Ângulo Nexum360</div>
            <div class="gen-result-text" style="max-height:60px">${escHtml(result.angulo_nexum)}</div>
          </div>` : ''}

          ${slides ? `
          <div class="gen-result-section">
            <div class="gen-result-label">${params.formato === 'Carrossel' ? 'Slides' : 'Conteúdo'}</div>
            <div class="gen-slides-list">${slides}</div>
          </div>` : ''}

          ${result.legenda_ig ? `
          <div class="gen-result-section">
            <div class="gen-result-label">Legenda Instagram</div>
            <div class="gen-result-text">${escHtml(result.legenda_ig)}</div>
          </div>` : ''}

          ${result.legenda_li ? `
          <div class="gen-result-section">
            <div class="gen-result-label">Legenda LinkedIn</div>
            <div class="gen-result-text">${escHtml(result.legenda_li)}</div>
          </div>` : ''}

          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
            <button class="gen-add-btn" onclick="addGenToPautas()">
              + Adicionar ao Repositório
            </button>
            <button onclick="copyGenResult()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.75rem;font-weight:600;padding:10px 16px;border-radius:6px;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
              📋 Copiar Legenda IG
            </button>
          </div>
        </div>`;

      // Salva resultado temporário para usar nos handlers
      window._lastGenResult = { result, params };
    }

    function addGenToPautas() {
      const { result, params } = window._lastGenResult || {};
      if (!result) return;
      const now   = new Date().toISOString().split('T')[0];
      const newId = pautas.length ? Math.max(...pautas.map(p=>p.id))+1 : 1;
      pautas.unshift({
        id:          newId,
        tema:        result.tema        || params.tema || 'Conteúdo gerado por IA',
        pilar:       params.pilar,
        rede_social: params.rede_social,
        formato:     params.formato,
        variante:    params.variante,
        status:      'Ideia',
        gancho:      result.gancho      || '',
        angulo_nexum:result.angulo_nexum|| '',
        picah:       result.picah       || [],
        legenda_ig:  result.legenda_ig  || '',
        legenda_li:  result.legenda_li  || '',
        fonte:       '',
        arquivo:     '',
        slide_preview:'',
        data_criacao:now,
        data_planejada:null,
        data_publicacao:null,
        notas:       `Gerado por IA em ${now}.`,
      });
      save();
      closeModal('generateOverlay');
      renderStats();
      renderCards();
      scaleCardIframes();
      showToast(`✓ Pauta "${result.tema?.slice(0,40)}..." adicionada!`, 'success');
    }

    function copyGenResult() {
      const { result } = window._lastGenResult || {};
      if (!result?.legenda_ig) { showToast('Nenhuma legenda para copiar.', 'error'); return; }
      navigator.clipboard.writeText(result.legenda_ig).then(() => {
        showToast('Legenda Instagram copiada!', 'success');
      });
    }

    // ── OPÇÃO 2: ABRIR NO CLAUDE.AI ───────────────────────────

    function doOpenClaude() {
      const p = getGenParams();
      const temaTxt   = p.tema   ? `O tema é: "${p.tema}"` : 'Sugira um tema relevante e atual para o posicionamento da Nexum360.';
      const ganchoTxt = p.gancho ? `O gancho sugerido: "${p.gancho}"` : 'Crie um gancho forte e original.';
      const pubFmtMap = { feed: 'Feed (grid do Instagram, proporção 4:5)', story: 'Story (vertical 9:16, sem legenda longa)', reels: 'Reels (vídeo curto, roteiro/legenda dinâmica)' };

      const isCarrossel = p.formato === 'Carrossel';
      const prompt = `Você é um estrategista sênior de marketing da Nexum360, especialista em posicionamento de marca, marketing orientado a resultados e inteligência artificial aplicada a negócios.

PARÂMETROS DO CONTEÚDO:
- Pilar: ${p.pilar}
- Rede Social: ${p.rede_social}
- Formato de conteúdo: ${p.formato}
- Formato de publicação: ${pubFmtMap[p.pub_formato] || p.pub_formato}
- Variante Visual: ${p.variante}
- Tema: ${temaTxt}
- Gancho: ${ganchoTxt}

TOM DE VOZ:
- Direto, inteligente e provocativo
- Sem clichês e sem frases motivacionais vazias
- Linguagem de negócio, não de influencer
- Foque em clareza, profundidade e impacto
- Público: empresários, gestores e decisores

ESTRUTURA${isCarrossel ? ' CARROSSEL (8 slides):\n- Slide 1: Hook forte (máx 15 palavras)\n- Slides 2–6: Desenvolvimento progressivo (máx 40 palavras por slide)\n- Slide 7: Insight ou virada de chave\n- Slide 8: Fechamento + CTA' : ' POST ÚNICO:\n- Frase principal forte e compartilhável\n- Subtexto de apoio estratégico'}

ENTREGUE:
1. Tema/Título completo
2. Gancho (frase de abertura)
3. Ângulo Nexum360 (como posiciona a marca)
4. ${isCarrossel ? 'Conteúdo de cada slide (número, título, texto)' : 'Conteúdo do post (título + texto)'}
5. Legenda Instagram completa (com CTA + 12 hashtags)
6. Legenda LinkedIn completa (com CTA + 10 hashtags)
7. PICAH identificado (P/I/C/A/H)

Siga o posicionamento: Nexum360 transforma IA em decisão, resultado e crescimento real — não em projeto piloto.`;

      navigator.clipboard.writeText(prompt).then(() => {
        showToast('Prompt copiado! Abrindo Claude.ai…', 'success');
        setTimeout(() => window.open('https://claude.ai/new', '_blank'), 600);
      }).catch(() => {
        // Fallback se clipboard não disponível
        window.open('https://claude.ai/new', '_blank');
        showToast('Abriu Claude.ai. Cole o prompt manualmente.', '');
      });
    }

    // Init
    loadVercelUrl();
    renderStats();
    renderCards();
  </script>
</body>
</html>
